<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ 正在前往 Potato WebDAV</title>
  <!-- 使用现代字体与优雅样式，无外部依赖 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1e2b 0%, #2a3140 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 装饰性背景光晕 */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(100, 180, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(180, 130, 255, 0.1) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.45), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: center;
      position: relative;
      z-index: 2;
      transition: transform 0.2s ease;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .icon-container {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 云存储风格图标 */
    .cloud-icon {
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .cloud-icon svg {
      width: 50px;
      height: 50px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 6px 12px rgba(0, 160, 255, 0.6));
      transition: stroke 0.2s;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: 1px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2.2rem;
      font-weight: 400;
      line-height: 1.5;
    }

    .target-url {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 0.9rem 1.8rem;
      margin: 0 auto 2.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #cbd5e1;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      max-width: 100%;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
    }

    .target-url span {
      color: #a5d8ff;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .progress-section {
      margin: 1.8rem 0 2rem;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.15);
      height: 6px;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      margin: 0 auto 0.8rem;
      backdrop-filter: blur(5px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6db3f2, #a18cd1);
      border-radius: 20px;
      box-shadow: 0 0 15px #7aa2f7;
      transition: width 0.1s linear;
    }

    .countdown-text {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .countdown-number {
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 0.2rem 1rem;
      font-weight: 700;
      color: #ffd966;
      min-width: 60px;
      display: inline-block;
      backdrop-filter: blur(10px);
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .btn {
      border: none;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 550;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      text-decoration: none;
      line-height: 1.2;
    }

    .btn-primary {
      background: rgba(90, 140, 255, 0.25);
      border-color: rgba(140, 180, 255, 0.5);
      box-shadow: 0 0 18px rgba(70, 130, 250, 0.5);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: rgba(70, 130, 250, 0.4);
      border-color: rgba(180, 200, 255, 0.8);
      box-shadow: 0 0 28px rgba(90, 150, 255, 0.8);
      transform: translateY(-2px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.45);
      transform: translateY(-2px);
      box-shadow: 0 14px 22px rgba(0,0,0,0.5);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .manual-link {
      color: #bdd3ff;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .manual-link:hover {
      color: #ffffff;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.2rem 1.5rem;
        border-radius: 2.5rem;
      }
      h1 {
        font-size: 1.9rem;
      }
      .btn {
        padding: 0.75rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <div class="cloud-icon">
        <!-- 简约云存储/文件夹图标 -->
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M20 16.2C21.2 15.6 22 14.4 22 13C22 10.8 20.2 9 18 9C17.4 7.8 16.3 6.9 15 6.5C14.1 4.3 11.9 2.8 9.5 3.1C7.1 3.4 5.3 5.4 5.2 7.8C3.3 8.1 2 9.8 2 11.8C2 13.9 3.7 15.6 5.8 15.6H18.5C19.2 15.6 19.9 15.8 20.5 16.1" />
          <polyline points="12 11 12 21" />
          <polyline points="9 18 12 21 15 18" />
        </svg>
      </div>
    </div>

    <h1>
      <span>📂</span>  Potato WebDAV
    </h1>
    <div class="subtitle">
      正在建立安全连接<br>即将为您跳转至文件服务
    </div>

    <div class="target-url">
      <span>🔗</span> potato-server.dynv6.net:28637/webdav
    </div>

    <div class="progress-section">
      <div class="progress-bar-bg">
        <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
      </div>
      <div class="countdown-text">
        <span>⏳</span> <span id="countdownDisplay" class="countdown-number">5 秒</span> <span>后自动跳转</span>
      </div>
    </div>

    <div class="button-group">
      <a id="redirectLink" href="https://potato-server.dynv6.net:28637/webdav" class="btn btn-primary">
        <span>🚀</span> 立即访问
      </a>
      <button id="cancelBtn" class="btn" type="button">
        <span>⏸️</span> 暂不跳转
      </button>
    </div>

    <div class="footer-note">
      <span>🔒</span> 加密传输 · 自动重定向
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // 目标 URL（与链接保持一致）
      const TARGET_URL = "https://potato-server.dynv6.net:28637/webdav";
      
      // 倒计时总秒数（可自行调整，这里设为5秒，视觉更舒适）
      const TOTAL_SECONDS = 5;
      
      // DOM 元素
      const progressFill = document.getElementById('progressFill');
      const countdownDisplay = document.getElementById('countdownDisplay');
      const redirectLink = document.getElementById('redirectLink');
      const cancelBtn = document.getElementById('cancelBtn');
      
      // 状态变量
      let remainingSeconds = TOTAL_SECONDS;
      let timerInterval = null;
      let isCancelled = false;
      let redirectTriggered = false; // 防止重复跳转
      
      // 更新进度条和倒计时文字
      function updateUI(secondsLeft) {
        // 计算进度百分比 (从0%到100%，剩余秒数越少进度越高)
        const elapsed = TOTAL_SECONDS - secondsLeft;
        const percent = Math.min(100, Math.max(0, (elapsed / TOTAL_SECONDS) * 100));
        
        if (progressFill) {
          progressFill.style.width = `${percent}%`;
        }
        
        if (countdownDisplay) {
          countdownDisplay.textContent = `${secondsLeft} 秒`;
        }
      }
      
      // 执行跳转
      function performRedirect() {
        if (redirectTriggered) return;
        redirectTriggered = true;
        
        // 清除定时器
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        // 更新UI为完成状态（进度100%，显示0秒）
        if (progressFill) {
          progressFill.style.width = '100%';
        }
        if (countdownDisplay) {
          countdownDisplay.textContent = '0 秒';
        }
        
        // 短暂延迟让用户看到满进度，然后跳转
        setTimeout(() => {
          // 使用 window.location.href 进行跳转，保留浏览器历史或直接替换
          window.location.href = TARGET_URL;
        }, 80);
      }
      
      // 取消自动跳转
      function cancelRedirect() {
        if (isCancelled) return;
        
        // 清除定时器
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        isCancelled = true;
        
        // 更新UI样式表示已取消
        if (countdownDisplay) {
          countdownDisplay.textContent = '已取消';
          countdownDisplay.style.color = '#ffb57c';
        }
        
        // 进度条可以保持当前状态或变灰，这里让它停在当前进度
        if (progressFill) {
          // 可选：改变进度条颜色表示暂停
          progressFill.style.background = 'linear-gradient(90deg, #9aa9b9, #7f8c8d)';
          progressFill.style.boxShadow = '0 0 10px #888';
        }
        
        // 修改取消按钮文案，变成“恢复跳转”
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>▶️</span> 恢复跳转';
          cancelBtn.setAttribute('data-action', 'resume');
        }
        
        // 同时可以让主按钮更明显
        console.log('自动跳转已取消。您可以手动点击按钮或恢复。');
      }
      
      // 恢复自动跳转（从取消状态）
      function resumeRedirect() {
        if (!isCancelled) return;
        if (redirectTriggered) return;
        
        // 重置状态
        isCancelled = false;
        
        // 恢复进度条样式
        if (progressFill) {
          progressFill.style.background = 'linear-gradient(90deg, #6db3f2, #a18cd1)';
          progressFill.style.boxShadow = '0 0 15px #7aa2f7';
        }
        
        if (countdownDisplay) {
          countdownDisplay.style.color = ''; // 恢复默认
        }
        
        // 重置取消按钮文字
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>⏸️</span> 暂不跳转';
          cancelBtn.setAttribute('data-action', 'cancel');
        }
        
        // 重要：如果剩余秒数已经为0或小于0，直接跳转；否则重新开始倒计时
        if (remainingSeconds <= 0) {
          // 如果已经到时间，立刻跳转
          performRedirect();
        } else {
          // 从当前剩余秒数继续倒计时
          startCountdown(remainingSeconds);
        }
      }
      
      // 启动倒计时（可指定起始秒数）
      function startCountdown(startFromSeconds) {
        // 清除可能存在的旧定时器
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        // 设置剩余秒数
        remainingSeconds = startFromSeconds;
        
        // 立即更新一次UI
        updateUI(remainingSeconds);
        
        // 如果剩余秒数已经为0或负数，直接跳转
        if (remainingSeconds <= 0) {
          performRedirect();
          return;
        }
        
        // 每秒执行
        timerInterval = setInterval(() => {
          // 再次检查是否取消或已经触发跳转
          if (isCancelled || redirectTriggered) {
            if (timerInterval) {
              clearInterval(timerInterval);
              timerInterval = null;
            }
            return;
          }
          
          remainingSeconds--;
          
          // 更新界面
          updateUI(remainingSeconds);
          
          // 倒计时结束
          if (remainingSeconds <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            // 执行跳转
            performRedirect();
          }
        }, 1000);
      }
      
      // 事件绑定
      function bindEvents() {
        // 主链接已经存在，无需额外阻止默认事件（它本身就是链接）
        // 但为了防止点击“立即访问”时重复触发定时器内的跳转，我们在点击时清除定时器并直接跳转。
        if (redirectLink) {
          redirectLink.addEventListener('click', function(e) {
            // 阻止链接默认行为？不，我们希望链接正常工作。
            // 但是为了避免定时器同时触发跳转导致问题，我们清除定时器并将redirectTriggered设为true
            if (redirectTriggered) {
              // 已经触发跳转，不做额外处理，链接会正常跳转
              return;
            }
            // 标记为已触发，清除定时器
            redirectTriggered = true;
            if (timerInterval) {
              clearInterval(timerInterval);
              timerInterval = null;
            }
            // 更新UI为完成状态（视觉上）
            if (progressFill) progressFill.style.width = '100%';
            if (countdownDisplay) countdownDisplay.textContent = '跳转中';
            // 链接默认行为会继续，无需手动调用 window.location
          });
        }
        
        // 取消/恢复按钮
        if (cancelBtn) {
          cancelBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const action = cancelBtn.getAttribute('data-action') || 'cancel';
            
            if (action === 'resume') {
              // 当前是恢复状态，调用恢复
              resumeRedirect();
            } else {
              // 默认取消动作
              cancelRedirect();
            }
          });
        }
        
        // 额外安全措施：如果用户通过浏览器历史导航等，避免内存泄漏
        window.addEventListener('beforeunload', function() {
          if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
        });
      }
      
      // 初始化整个页面
      function init() {
        // 设置链接的href确保正确（已经写在HTML中，但以防动态修改）
        if (redirectLink) {
          redirectLink.setAttribute('href', TARGET_URL);
        }
        
        // 重置状态
        isCancelled = false;
        redirectTriggered = false;
        remainingSeconds = TOTAL_SECONDS;
        
        // 确保进度条样式为初始
        if (progressFill) {
          progressFill.style.background = 'linear-gradient(90deg, #6db3f2, #a18cd1)';
          progressFill.style.boxShadow = '0 0 15px #7aa2f7';
          progressFill.style.width = '0%';
        }
        if (countdownDisplay) {
          countdownDisplay.style.color = '';
        }
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>⏸️</span> 暂不跳转';
          cancelBtn.setAttribute('data-action', 'cancel');
        }
        
        // 绑定事件
        bindEvents();
        
        // 启动倒计时
        startCountdown(TOTAL_SECONDS);
      }
      
      // 页面加载完成后启动
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
