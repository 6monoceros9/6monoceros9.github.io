<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>鉁?姝ｅ湪鍓嶅線 Potato WebDAV</title>
  <!-- 浣跨敤鐜颁唬瀛椾綋涓庝紭闆呮牱寮忥紝鏃犲閮ㄤ緷璧?-->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1e2b 0%, #2a3140 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 瑁呴グ鎬ц儗鏅厜鏅?*/
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(100, 180, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(180, 130, 255, 0.1) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.45), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: center;
      position: relative;
      z-index: 2;
      transition: transform 0.2s ease;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .icon-container {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 浜戝瓨鍌ㄩ鏍煎浘鏍?*/
    .cloud-icon {
      width: 90px;
      height: 90px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .cloud-icon svg {
      width: 50px;
      height: 50px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 6px 12px rgba(0, 160, 255, 0.6));
      transition: stroke 0.2s;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: 1px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2.2rem;
      font-weight: 400;
      line-height: 1.5;
    }

    .target-url {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 0.9rem 1.8rem;
      margin: 0 auto 2.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #cbd5e1;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      max-width: 100%;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
    }

    .target-url span {
      color: #a5d8ff;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .progress-section {
      margin: 1.8rem 0 2rem;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.15);
      height: 6px;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      margin: 0 auto 0.8rem;
      backdrop-filter: blur(5px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6db3f2, #a18cd1);
      border-radius: 20px;
      box-shadow: 0 0 15px #7aa2f7;
      transition: width 0.1s linear;
    }

    .countdown-text {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .countdown-number {
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 0.2rem 1rem;
      font-weight: 700;
      color: #ffd966;
      min-width: 60px;
      display: inline-block;
      backdrop-filter: blur(10px);
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .btn {
      border: none;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 550;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      text-decoration: none;
      line-height: 1.2;
    }

    .btn-primary {
      background: rgba(90, 140, 255, 0.25);
      border-color: rgba(140, 180, 255, 0.5);
      box-shadow: 0 0 18px rgba(70, 130, 250, 0.5);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: rgba(70, 130, 250, 0.4);
      border-color: rgba(180, 200, 255, 0.8);
      box-shadow: 0 0 28px rgba(90, 150, 255, 0.8);
      transform: translateY(-2px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.45);
      transform: translateY(-2px);
      box-shadow: 0 14px 22px rgba(0,0,0,0.5);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .manual-link {
      color: #bdd3ff;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .manual-link:hover {
      color: #ffffff;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.2rem 1.5rem;
        border-radius: 2.5rem;
      }
      h1 {
        font-size: 1.9rem;
      }
      .btn {
        padding: 0.75rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <div class="cloud-icon">
        <!-- 绠€绾︿簯瀛樺偍/鏂囦欢澶瑰浘鏍?-->
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M20 16.2C21.2 15.6 22 14.4 22 13C22 10.8 20.2 9 18 9C17.4 7.8 16.3 6.9 15 6.5C14.1 4.3 11.9 2.8 9.5 3.1C7.1 3.4 5.3 5.4 5.2 7.8C3.3 8.1 2 9.8 2 11.8C2 13.9 3.7 15.6 5.8 15.6H18.5C19.2 15.6 19.9 15.8 20.5 16.1" />
          <polyline points="12 11 12 21" />
          <polyline points="9 18 12 21 15 18" />
        </svg>
      </div>
    </div>

    <h1>
      <span>馃搨</span>  Potato WebDAV
    </h1>
    <div class="subtitle">
      姝ｅ湪寤虹珛瀹夊叏杩炴帴<br>鍗冲皢涓烘偍璺宠浆鑷虫枃浠舵湇鍔?
    </div>

    <div class="target-url">
      <span>馃敆</span> potato-server.dynv6.net:28637/webdav
    </div>

    <div class="progress-section">
      <div class="progress-bar-bg">
        <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
      </div>
      <div class="countdown-text">
        <span>鈴?/span> <span id="countdownDisplay" class="countdown-number">5 绉?/span> <span>鍚庤嚜鍔ㄨ烦杞?/span>
      </div>
    </div>

    <div class="button-group">
      <a id="redirectLink" href="https://potato-server.dynv6.net:28637/webdav" class="btn btn-primary">
        <span>馃殌</span> 绔嬪嵆璁块棶
      </a>
      <button id="cancelBtn" class="btn" type="button">
        <span>鈴革笍</span> 鏆備笉璺宠浆
      </button>
    </div>

    <div class="footer-note">
      <span>馃敀</span> 鍔犲瘑浼犺緭 路 鑷姩閲嶅畾鍚?
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // 鐩爣 URL锛堜笌閾炬帴淇濇寔涓€鑷达級
      const TARGET_URL = "https://potato-server.dynv6.net:28637/webdav";
      
      // 鍊掕鏃舵€荤鏁帮紙鍙嚜琛岃皟鏁达紝杩欓噷璁句负5绉掞紝瑙嗚鏇磋垝閫傦級
      const TOTAL_SECONDS = 5;
      
      // DOM 鍏冪礌
      const progressFill = document.getElementById('progressFill');
      const countdownDisplay = document.getElementById('countdownDisplay');
      const redirectLink = document.getElementById('redirectLink');
      const cancelBtn = document.getElementById('cancelBtn');
      
      // 鐘舵€佸彉閲?
      let remainingSeconds = TOTAL_SECONDS;
      let timerInterval = null;
      let isCancelled = false;
      let redirectTriggered = false; // 闃叉閲嶅璺宠浆
      
      // 鏇存柊杩涘害鏉″拰鍊掕鏃舵枃瀛?
      function updateUI(secondsLeft) {
        // 璁＄畻杩涘害鐧惧垎姣?(浠?%鍒?00%锛屽墿浣欑鏁拌秺灏戣繘搴﹁秺楂?
        const elapsed = TOTAL_SECONDS - secondsLeft;
        const percent = Math.min(100, Math.max(0, (elapsed / TOTAL_SECONDS) * 100));
        
        if (progressFill) {
          progressFill.style.width = `${percent}%`;
        }
        
        if (countdownDisplay) {
          countdownDisplay.textContent = `${secondsLeft} 绉抈;
        }
      }
      
      // 鎵ц璺宠浆
      function performRedirect() {
        if (redirectTriggered) return;
        redirectTriggered = true;
        
        // 娓呴櫎瀹氭椂鍣?
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        // 鏇存柊UI涓哄畬鎴愮姸鎬侊紙杩涘害100%锛屾樉绀?绉掞級
        if (progressFill) {
          progressFill.style.width = '100%';
        }
        if (countdownDisplay) {
          countdownDisplay.textContent = '0 绉?;
        }
        
        // 鐭殏寤惰繜璁╃敤鎴风湅鍒版弧杩涘害锛岀劧鍚庤烦杞?
        setTimeout(() => {
          // 浣跨敤 window.location.href 杩涜璺宠浆锛屼繚鐣欐祻瑙堝櫒鍘嗗彶鎴栫洿鎺ユ浛鎹?
          window.location.href = TARGET_URL;
        }, 80);
      }
      
      // 鍙栨秷鑷姩璺宠浆
      function cancelRedirect() {
        if (isCancelled) return;
        
        // 娓呴櫎瀹氭椂鍣?
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        isCancelled = true;
        
        // 鏇存柊UI鏍峰紡琛ㄧず宸插彇娑?
        if (countdownDisplay) {
          countdownDisplay.textContent = '宸插彇娑?;
          countdownDisplay.style.color = '#ffb57c';
        }
        
        // 杩涘害鏉″彲浠ヤ繚鎸佸綋鍓嶇姸鎬佹垨鍙樼伆锛岃繖閲岃瀹冨仠鍦ㄥ綋鍓嶈繘搴?
        if (progressFill) {
          // 鍙€夛細鏀瑰彉杩涘害鏉￠鑹茶〃绀烘殏鍋?
          progressFill.style.background = 'linear-gradient(90deg, #9aa9b9, #7f8c8d)';
          progressFill.style.boxShadow = '0 0 10px #888';
        }
        
        // 淇敼鍙栨秷鎸夐挳鏂囨锛屽彉鎴愨€滄仮澶嶈烦杞€?
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>鈻讹笍</span> 鎭㈠璺宠浆';
          cancelBtn.setAttribute('data-action', 'resume');
        }
        
        // 鍚屾椂鍙互璁╀富鎸夐挳鏇存槑鏄?
        console.log('鑷姩璺宠浆宸插彇娑堛€傛偍鍙互鎵嬪姩鐐瑰嚮鎸夐挳鎴栨仮澶嶃€?);
      }
      
      // 鎭㈠鑷姩璺宠浆锛堜粠鍙栨秷鐘舵€侊級
      function resumeRedirect() {
        if (!isCancelled) return;
        if (redirectTriggered) return;
        
        // 閲嶇疆鐘舵€?
        isCancelled = false;
        
        // 鎭㈠杩涘害鏉℃牱寮?
        if (progressFill) {
          progressFill.style.background = 'linear-gradient(90deg, #6db3f2, #a18cd1)';
          progressFill.style.boxShadow = '0 0 15px #7aa2f7';
        }
        
        if (countdownDisplay) {
          countdownDisplay.style.color = ''; // 鎭㈠榛樿
        }
        
        // 閲嶇疆鍙栨秷鎸夐挳鏂囧瓧
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>鈴革笍</span> 鏆備笉璺宠浆';
          cancelBtn.setAttribute('data-action', 'cancel');
        }
        
        // 閲嶈锛氬鏋滃墿浣欑鏁板凡缁忎负0鎴栧皬浜?锛岀洿鎺ヨ烦杞紱鍚﹀垯閲嶆柊寮€濮嬪€掕鏃?
        if (remainingSeconds <= 0) {
          // 濡傛灉宸茬粡鍒版椂闂达紝绔嬪埢璺宠浆
          performRedirect();
        } else {
          // 浠庡綋鍓嶅墿浣欑鏁扮户缁€掕鏃?
          startCountdown(remainingSeconds);
        }
      }
      
      // 鍚姩鍊掕鏃讹紙鍙寚瀹氳捣濮嬬鏁帮級
      function startCountdown(startFromSeconds) {
        // 娓呴櫎鍙兘瀛樺湪鐨勬棫瀹氭椂鍣?
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        
        // 璁剧疆鍓╀綑绉掓暟
        remainingSeconds = startFromSeconds;
        
        // 绔嬪嵆鏇存柊涓€娆I
        updateUI(remainingSeconds);
        
        // 濡傛灉鍓╀綑绉掓暟宸茬粡涓?鎴栬礋鏁帮紝鐩存帴璺宠浆
        if (remainingSeconds <= 0) {
          performRedirect();
          return;
        }
        
        // 姣忕鎵ц
        timerInterval = setInterval(() => {
          // 鍐嶆妫€鏌ユ槸鍚﹀彇娑堟垨宸茬粡瑙﹀彂璺宠浆
          if (isCancelled || redirectTriggered) {
            if (timerInterval) {
              clearInterval(timerInterval);
              timerInterval = null;
            }
            return;
          }
          
          remainingSeconds--;
          
          // 鏇存柊鐣岄潰
          updateUI(remainingSeconds);
          
          // 鍊掕鏃剁粨鏉?
          if (remainingSeconds <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            // 鎵ц璺宠浆
            performRedirect();
          }
        }, 1000);
      }
      
      // 浜嬩欢缁戝畾
      function bindEvents() {
        // 涓婚摼鎺ュ凡缁忓瓨鍦紝鏃犻渶棰濆闃绘榛樿浜嬩欢锛堝畠鏈韩灏辨槸閾炬帴锛?
        // 浣嗕负浜嗛槻姝㈢偣鍑烩€滅珛鍗宠闂€濇椂閲嶅瑙﹀彂瀹氭椂鍣ㄥ唴鐨勮烦杞紝鎴戜滑鍦ㄧ偣鍑绘椂娓呴櫎瀹氭椂鍣ㄥ苟鐩存帴璺宠浆銆?
        if (redirectLink) {
          redirectLink.addEventListener('click', function(e) {
            // 闃绘閾炬帴榛樿琛屼负锛熶笉锛屾垜浠笇鏈涢摼鎺ユ甯稿伐浣溿€?
            // 浣嗘槸涓轰簡閬垮厤瀹氭椂鍣ㄥ悓鏃惰Е鍙戣烦杞鑷撮棶棰橈紝鎴戜滑娓呴櫎瀹氭椂鍣ㄥ苟灏唕edirectTriggered璁句负true
            if (redirectTriggered) {
              // 宸茬粡瑙﹀彂璺宠浆锛屼笉鍋氶澶栧鐞嗭紝閾炬帴浼氭甯歌烦杞?
              return;
            }
            // 鏍囪涓哄凡瑙﹀彂锛屾竻闄ゅ畾鏃跺櫒
            redirectTriggered = true;
            if (timerInterval) {
              clearInterval(timerInterval);
              timerInterval = null;
            }
            // 鏇存柊UI涓哄畬鎴愮姸鎬侊紙瑙嗚涓婏級
            if (progressFill) progressFill.style.width = '100%';
            if (countdownDisplay) countdownDisplay.textContent = '璺宠浆涓?;
            // 閾炬帴榛樿琛屼负浼氱户缁紝鏃犻渶鎵嬪姩璋冪敤 window.location
          });
        }
        
        // 鍙栨秷/鎭㈠鎸夐挳
        if (cancelBtn) {
          cancelBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const action = cancelBtn.getAttribute('data-action') || 'cancel';
            
            if (action === 'resume') {
              // 褰撳墠鏄仮澶嶇姸鎬侊紝璋冪敤鎭㈠
              resumeRedirect();
            } else {
              // 榛樿鍙栨秷鍔ㄤ綔
              cancelRedirect();
            }
          });
        }
        
        // 棰濆瀹夊叏鎺柦锛氬鏋滅敤鎴烽€氳繃娴忚鍣ㄥ巻鍙插鑸瓑锛岄伩鍏嶅唴瀛樻硠婕?
        window.addEventListener('beforeunload', function() {
          if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
        });
      }
      
      // 鍒濆鍖栨暣涓〉闈?
      function init() {
        // 璁剧疆閾炬帴鐨刪ref纭繚姝ｇ‘锛堝凡缁忓啓鍦℉TML涓紝浣嗕互闃插姩鎬佷慨鏀癸級
        if (redirectLink) {
          redirectLink.setAttribute('href', TARGET_URL);
        }
        
        // 閲嶇疆鐘舵€?
        isCancelled = false;
        redirectTriggered = false;
        remainingSeconds = TOTAL_SECONDS;
        
        // 纭繚杩涘害鏉℃牱寮忎负鍒濆
        if (progressFill) {
          progressFill.style.background = 'linear-gradient(90deg, #6db3f2, #a18cd1)';
          progressFill.style.boxShadow = '0 0 15px #7aa2f7';
          progressFill.style.width = '0%';
        }
        if (countdownDisplay) {
          countdownDisplay.style.color = '';
        }
        if (cancelBtn) {
          cancelBtn.innerHTML = '<span>鈴革笍</span> 鏆備笉璺宠浆';
          cancelBtn.setAttribute('data-action', 'cancel');
        }
        
        // 缁戝畾浜嬩欢
        bindEvents();
        
        // 鍚姩鍊掕鏃?
        startCountdown(TOTAL_SECONDS);
      }
      
      // 椤甸潰鍔犺浇瀹屾垚鍚庡惎鍔?
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
