<!DOCTYPE html>
<html>
<head>
    <!-- 设置页面编码为 GBK -->
    <meta charset="GBK">
    <!-- '0' 表示立即重定向，你也可以设置为 '5' 来延迟5秒 -->
    <meta http-equiv="refresh" content="0; url=https://potato-server.dynv6.net:28637/webdav" />
    <title>重定向中...</title>
</head>
<body>
    <!-- 如果浏览器不支持自动跳转，显示一个可点击的链接 -->
    <p>如果页面没有自动跳转，请点击 <a href="https://potato-server.dynv6.net:28637/webdav">这里</a>。</p>
</body>
</html>
